version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  CineMatch — Movie Recommendation System
#  Services:
#    api       — FastAPI backend + HTML/JS frontend  → http://localhost:8000
#    dashboard — Streamlit analytics dashboard       → http://localhost:8501
# ─────────────────────────────────────────────────────────────────────────────

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cinematch-api:latest
    container_name: cinematch-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    environment:
      - MODELS_DIR=/app/models
      - DATA_DIR=/app/data
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: cinematch-dashboard:latest
    container_name: cinematch-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    environment:
      - MODELS_DIR=/app/models
      - DATA_DIR=/app/data
      - PYTHONUNBUFFERED=1
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: cinematch-network
